# CodeRabbit AI Code Review Configuration
# Docs: https://docs.coderabbit.ai/reference/configuration

language: "en"
early_access: false
reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  path_filters:
    - "!**/*.lock"
    - "!**/*.map"
    - "!**/node_modules/**"
    - "!**/vendor/**"
    - "!**/.next/**"
  path_instructions:
    - path: "src/**/*.ts"
      instructions: |
        Check for TypeScript best practices, proper typing (avoid `any`), async error handling, and Prisma query optimization.
    - path: "src/**/*.tsx"
      instructions: |
        Review React patterns, server/client component boundaries, hook dependencies, and Tailwind class organization.
    - path: "prisma/**/*.prisma"
      instructions: |
        Check schema design, indexing, and relations.
    - path: "prisma/migrations/**/*.sql"
      instructions: |
        Check migration safety, destructive changes, locking, backfills, and rollback compatibility.
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - "main"
chat:
  auto_reply: true

name: Setup Domain

on:
  workflow_dispatch:

jobs:
  domain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Link Vercel project
        run: npx vercel link --project wujood --token=${{ secrets.VERCEL_TOKEN }} --yes
      - name: List current domains
        run: npx vercel domains ls --token=${{ secrets.VERCEL_TOKEN }}
      - name: Add apex domain wujood.app
        run: npx vercel domains add wujood.app --token=${{ secrets.VERCEL_TOKEN }} --yes || echo "DOMAIN_ALREADY_ADDED_OR_NEEDS_VERIFICATION"
      - name: Inspect required DNS configuration
        run: npx vercel domains inspect wujood.app --token=${{ secrets.VERCEL_TOKEN }}
      - name: DNS records to add at your registrar
        run: |
          echo "==================================================================="
          echo "Domain wujood.app has been added to the Vercel project 'wujood'."
          echo "Now add these records at your DNS provider (registrar) for wujood.app:"
          echo "  Type  Name  Value"
          echo "  A     @     76.76.21.21"
          echo "  AAAA  @     2606:1a41::1"
          echo "  AAAA  @     2606:1a41::2"
          echo "After saving, Vercel auto-verifies and provisions the SSL cert."
          echo "Re-run 'vercel domains inspect wujood.app' to confirm verification."
          echo "==================================================================="

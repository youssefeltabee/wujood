name: Deploy to Vercel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npx prisma generate
      # Schema is pushed via the Supabase pooler (DATABASE_URL, IPv4) which
      # GitHub-hosted runners can reach. This step is best-effort: it logs the
      # outcome so a real failure is never masked as the expected skip.
      - name: Push database schema (best-effort)
        id: db-push
        continue-on-error: true
        run: npx prisma db push --accept-data-loss
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
      - name: Report schema push result
        if: always()
        run: |
          case "${{ steps.db-push.outcome }}" in
            success)
              echo "Schema push succeeded"
              ;;
            skipped)
              echo "::error::Schema push was skipped unexpectedly (DB schema may be out of sync). This should not happen now that push runs via the Supabase pooler (IPv4). Investigate the runner/job configuration."
              ;;
            failure|cancelled)
              echo "::error::Schema push ${{ steps.db-push.outcome }} — this is NOT the expected IPv6 skip. Check DATABASE_URL/DIRECT_URL and Supabase connectivity."
              ;;
            *)
              echo "Schema push outcome unknown: ${{ steps.db-push.outcome }}"
              ;;
          esac
      - name: Ensure env vars in Vercel project via CLI
        run: |
          npx vercel link --project wujood --token=${{ secrets.VERCEL_TOKEN }} --yes 2>&1
          echo "${{ secrets.DATABASE_URL }}" | npx vercel env add DATABASE_URL production --force --token=${{ secrets.VERCEL_TOKEN }} --yes 2>&1 || echo "→ DATABASE_URL skipped"
          echo "${{ secrets.DIRECT_URL }}" | npx vercel env add DIRECT_URL production --force --token=${{ secrets.VERCEL_TOKEN }} --yes 2>&1 || echo "→ DIRECT_URL skipped"
          echo "${{ secrets.JWT_SECRET }}" | npx vercel env add JWT_SECRET production --force --token=${{ secrets.VERCEL_TOKEN }} --yes 2>&1 || echo "→ JWT_SECRET skipped"
      - run: npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - run: npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - run: npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}


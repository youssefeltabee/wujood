name: Deploy to Vercel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npx prisma generate
      - name: Push database schema
        continue-on-error: true
        run: npx prisma db push --accept-data-loss
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
      - name: Ensure env vars in Vercel project via API
        run: |
          set +e
          curl -sf -X POST "https://api.vercel.com/v10/projects/wujood/env" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data-raw "{\"key\":\"DATABASE_URL\",\"value\":\"${{ secrets.DATABASE_URL }}\",\"type\":\"encrypted\",\"target\":[\"production\"]}" \
            && echo "✓ DATABASE_URL" || echo "→ DATABASE_URL exists or wrong project name"
          curl -sf -X POST "https://api.vercel.com/v10/projects/wujood/env" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data-raw "{\"key\":\"DIRECT_URL\",\"value\":\"${{ secrets.DIRECT_URL }}\",\"type\":\"encrypted\",\"target\":[\"production\"]}" \
            && echo "✓ DIRECT_URL" || echo "→ DIRECT_URL exists or wrong project name"
          curl -sf -X POST "https://api.vercel.com/v10/projects/wujood/env" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data-raw "{\"key\":\"JWT_SECRET\",\"value\":\"${{ secrets.JWT_SECRET }}\",\"type\":\"encrypted\",\"target\":[\"production\"]}" \
            && echo "✓ JWT_SECRET" || echo "→ JWT_SECRET exists or wrong project name"
      - run: npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - run: npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - run: npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

